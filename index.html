<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluxograma - Sistemas de Informação</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --primary: #00a84a;
    --primary-light: #e6f7ed;
    --primary-dark: #008442;
    --accent: #f0852e;
    --accent-dark: #e06d10;
    --bg: #f5f5f5;
    --card-bg: #fff;
    --text: #212121;
    --text-secondary: #6b6b6b;
    --border: #e0e0e0;
    --shadow: 0 2px 8px rgba(0,0,0,0.12);
    --shadow-hover: 0 4px 20px rgba(0,0,0,0.18);
    --radius: 12px;
  }

  body {
    font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .app-bar {
    background: linear-gradient(to left, #56BFC9, #24A637 65%);
    color: #fff;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .app-bar h1 { font-size: 22px; font-weight: 500; letter-spacing: 0.5px; }
  .app-bar .subtitle { font-size: 13px; opacity: 0.85; margin-top: 2px; }

  .legend-bar {
    display: flex;
    gap: 24px;
    padding: 12px 24px;
    background: var(--card-bg);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    align-items: center;
  }

  .legend-bar .title { font-weight: 600; font-size: 13px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }

  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; }
  .legend-item .dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
  .legend-item .dot.sem { background: #00a84a; }
  .legend-item .dot.eletiva { background: #56BFC9; }
  .legend-item .dot.estagio { background: #008442; }
  .legend-item .dot.tcc { background: var(--accent); }
  .legend-item .line-sample { width: 28px; height: 2px; background: #00a84a; flex-shrink: 0; position: relative; }
  .legend-item .line-sample::after { content: ''; position: absolute; right: -2px; top: -4px; width: 0; height: 0; border-left: 6px solid #00a84a; border-top: 5px solid transparent; border-bottom: 5px solid transparent; }

  main {
    max-width: 1500px;
    margin: 0 auto;
    padding: 24px;
    overflow-x: auto;
  }

  .flowchart { position: relative; padding-top: 8px; }

  .semester-row {
    display: flex;
    gap: 20px;
    margin-bottom: 36px;
    position: relative;
    align-items: flex-start;
  }

  .semester-sidebar {
    width: 110px;
    min-width: 110px;
    padding-top: 20px;
    text-align: center;
    flex-shrink: 0;
  }

  .semester-sidebar .label {
    font-size: 12px;
    font-weight: 700;
    color: #00a84a;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    background: #e6f7ed;
    border-radius: 20px;
    padding: 8px 12px;
    display: inline-block;
    writing-mode: vertical-lr;
    transform: rotate(180deg);
    min-height: 120px;
    line-height: 1.2;
  }

  .semester-sidebar .label.eletiva-label {
    writing-mode: horizontal-tb;
    transform: none;
    min-height: auto;
    font-size: 11px;
    padding: 8px 12px;
  }

  .cards-wrapper {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    flex: 1;
    min-width: 0;
    padding: 8px 0;
  }

  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px 16px;
    width: 180px;
    min-height: 86px;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    border: 2px solid transparent;
    display: flex;
    flex-direction: column;
    gap: 2px;
    border-top: 3px solid var(--primary);
  }

  .card:hover {
    box-shadow: var(--shadow-hover);
    transform: translateY(-3px);
    border-color: var(--primary);
  }

  .card.active {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(0,168,74,0.3), var(--shadow-hover);
    transform: translateY(-3px);
    background: #e6f7ed;
  }

  .card.prereq {
    border-color: #008442 !important;
    box-shadow: 0 0 0 3px rgba(0,132,66,0.25), var(--shadow-hover);
    transform: translateY(-3px);
    background: #f1f8e9;
  }

  .card.dependent {
    border-color: var(--accent) !important;
    box-shadow: 0 0 0 3px rgba(240,133,46,0.25), var(--shadow-hover);
    transform: translateY(-3px);
    background: #fef3e8;
  }

  .card .code { font-size: 11px; color: var(--text-secondary); font-weight: 600; letter-spacing: 0.5px; }
  .card .name { font-size: 13px; font-weight: 600; line-height: 1.3; margin: 2px 0; flex: 1; }
  .card .credits { font-size: 11px; color: var(--text-secondary); }
  .card .card-info { font-size: 10px; color: var(--text-secondary); line-height: 1.4; margin-top: 6px; padding: 5px 6px; border-radius: 6px; background: #f5faf7; }
  .card .card-info span { display: block; }
  .card .card-info .label { font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; font-size: 9px; }
  .card.eletiva .card-info { background: #f4fafb; }
  .card.estagio .card-info { background: #f1f8f4; }
  .card.tcc .card-info { background: #fef6ef; }

  .card .badge {
    position: absolute;
    top: -8px;
    right: -8px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    z-index: 5;
  }

  .card .badge { background: #00a84a; }
  .card.eletiva .badge { background: #56BFC9; }
  .card.estagio .badge { background: #008442; }
  .card.tcc .badge { background: #f0852e; }

  .card.eletiva { border-top-color: #56BFC9; }
  .card.estagio { border-top-color: #008442; }
  .card.tcc { border-top-color: var(--accent); }

  .svg-layer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  .svg-layer svg {
    display: block;
  }

  .semester-row { position: relative; z-index: 2; }

  svg path.connection {
    stroke: #00a84a;
    stroke-width: 2;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0.25;
    transition: opacity 0.3s, stroke-width 0.3s;
  }

  svg path.connection.highlighted {
    opacity: 0.85;
    stroke-width: 3;
    stroke: #f0852e;
  }

  svg path.connection.incoming {
    opacity: 0.85;
    stroke-width: 3;
    stroke: #008442;
  }

  svg path.connection.outgoing {
    opacity: 0.85;
    stroke-width: 3;
    stroke: #f0852e;
  }

  .tooltip {
    position: fixed;
    background: #323232;
    color: #fff;
    padding: 12px 18px;
    border-radius: 8px;
    font-size: 13px;
    max-width: 300px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.3);
    pointer-events: none;
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.2s;
    line-height: 1.5;
  }

  .tooltip.visible { opacity: 1; }

  .tooltip .tt-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
  .tooltip .tt-label { font-size: 11px; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.5px; }

  @media (max-width: 768px) {
    .card { width: 150px; min-height: 76px; padding: 10px 12px; }
    .app-bar { padding: 14px 16px; }
    .app-bar h1 { font-size: 18px; }
    main { padding: 12px; }
    .semester-row { gap: 12px; margin-bottom: 28px; }
    .semester-sidebar { width: 60px; min-width: 60px; }
    .semester-sidebar .label { font-size: 10px; padding: 6px 8px; min-height: 80px; }
  }

  @media (max-width: 480px) {
    .card { width: 140px; min-height: 70px; }
    .card .name { font-size: 11px; }
    .semester-row { gap: 8px; margin-bottom: 24px; }
    .legend-bar { gap: 12px; padding: 10px 12px; }
    .semester-sidebar { width: 50px; min-width: 50px; }
  }
</style>
</head>
<body>

<div class="app-bar">
  <div>
    <h1>Fluxograma do Curso</h1>
    <div class="subtitle">Sistemas de Informação &mdash; Grade Curricular com Pré-Requisitos</div>
  </div>
</div>

<div class="legend-bar">
  <span class="title">Legenda</span>
  <span class="legend-item"><span class="dot sem"></span> Obrigatória</span>
  <span class="legend-item"><span class="dot eletiva"></span> Eletiva</span>
  <span class="legend-item"><span class="dot estagio"></span> Estágio</span>
  <span class="legend-item"><span class="dot tcc"></span> TCC</span>
  <span class="legend-item"><span class="line-sample"></span> Pré-Requisito</span>
  <span style="font-size:12px;color:var(--text-secondary);margin-left:auto;">Clique em uma disciplina para destacar conexões</span>
</div>

<main>
  <div class="flowchart" id="flowchart">
    <div class="svg-layer" id="svgLayer">
      <svg id="svgConnections"></svg>
    </div>
  </div>
</main>

<div class="tooltip" id="tooltip"></div>

<script>
  const data = [
    { code: 'SI001', name: 'Fundamentos de Programação', semester: 1, credits: 3, prereqs: [], type: 'obrigatoria' },
    { code: 'SI002', name: 'Pré-Cálculo', semester: 1, credits: 2, prereqs: [], type: 'obrigatoria' },
    { code: 'SI003', name: 'Matemática Básica', semester: 1, credits: 4, prereqs: [], type: 'obrigatoria' },
    { code: 'SI004', name: 'Introdução aos Sistemas de Informação', semester: 1, credits: 4, prereqs: [], type: 'obrigatoria' },
    { code: 'SI005', name: 'Introdução à Administração', semester: 1, credits: 3, prereqs: [], type: 'obrigatoria' },

    { code: 'SI006', name: 'Arquitetura de Computadores', semester: 2, credits: 4, prereqs: [], type: 'obrigatoria' },
    { code: 'SI007', name: 'Programação Orientada a Objetos', semester: 2, credits: 3, prereqs: ['SI001'], type: 'obrigatoria' },
    { code: 'SI008', name: 'Matemática Discreta', semester: 2, credits: 4, prereqs: ['SI003'], type: 'obrigatoria' },
    { code: 'SI009', name: 'Cálculo Diferencial e Integral I', semester: 2, credits: 4, prereqs: ['SI002'], type: 'obrigatoria' },
    { code: 'SI010', name: 'Sistemas de Informação', semester: 2, credits: 3, prereqs: ['SI004', 'SI005'], type: 'obrigatoria' },

    { code: 'SI011', name: 'Estrutura de Dados', semester: 3, credits: 3, prereqs: ['SI001'], type: 'obrigatoria' },
    { code: 'SI012', name: 'Fundamentos de Banco de Dados', semester: 3, credits: 3, prereqs: [], type: 'obrigatoria' },
    { code: 'SI013', name: 'Sistemas Operacionais', semester: 3, credits: 4, prereqs: ['SI006'], type: 'obrigatoria' },
    { code: 'SI014', name: 'Análise e Projeto de Sistemas', semester: 3, credits: 4, prereqs: ['SI007'], type: 'obrigatoria' },
    { code: 'SI015', name: 'Gestão de Processos de Negócios', semester: 3, credits: 3, prereqs: ['SI004', 'SI005'], type: 'obrigatoria' },

    { code: 'SI016', name: 'Probabilidade e Estatística', semester: 4, credits: 4, prereqs: ['SI003'], type: 'obrigatoria' },
    { code: 'SI017', name: 'Redes de Computadores', semester: 4, credits: 3, prereqs: [], type: 'obrigatoria' },
    { code: 'SI018', name: 'Gestão da Informação e do Conhecimento', semester: 4, credits: 4, prereqs: ['SI010'], type: 'obrigatoria' },
    { code: 'SI019', name: 'Requisitos de Software', semester: 4, credits: 4, prereqs: ['SI014'], type: 'obrigatoria' },
    { code: 'SI020', name: 'Ética, Direito e Legislação', semester: 4, credits: 2, prereqs: [], type: 'obrigatoria' },

    { code: 'SI021', name: 'Lógica para Computação', semester: 5, credits: 4, prereqs: ['SI008'], type: 'obrigatoria' },
    { code: 'SI022', name: 'Engenharia de Software', semester: 5, credits: 4, prereqs: ['SI014'], type: 'obrigatoria' },
    { code: 'SI023', name: 'Auditoria e Seg. de Sist. de Informação', semester: 5, credits: 4, prereqs: [], type: 'obrigatoria' },
    { code: 'SI024', name: 'Desenv. de Software para a Web', semester: 5, credits: 4, prereqs: ['SI007', 'SI012'], type: 'obrigatoria' },
    { code: 'SI033', name: 'Gestão da Tecnologia da Informação', semester: 5, credits: 4, prereqs: ['SI018'], type: 'obrigatoria' },

    { code: 'SI025', name: 'Interação Humano-Computador', semester: 6, credits: 4, prereqs: [], type: 'obrigatoria' },
    { code: 'SI026', name: 'Gerência de Projetos de Software', semester: 6, credits: 4, prereqs: ['SI014'], type: 'obrigatoria' },
    { code: 'SI027', name: 'Empreendedorismo', semester: 6, credits: 2, prereqs: [], type: 'obrigatoria' },

    { code: 'SI028', name: 'Trabalho de Conclusão de Curso I', semester: 7, credits: 4, prereqs: ['SI030'], type: 'tcc' },
    { code: 'SI029', name: 'Estágio Supervisionado I', semester: 7, credits: 8, prereqs: [], type: 'estagio' },
    { code: 'SI030', name: 'Projeto de Pesq. Científica e Tecnológica', semester: 7, credits: 2, prereqs: ['SI024', 'SI026', 'SI033'], type: 'obrigatoria' },

    { code: 'SI031', name: 'Trabalho de Conclusão de Curso II', semester: 8, credits: 4, prereqs: ['SI028'], type: 'tcc' },
    { code: 'SI032', name: 'Estágio Supervisionado II', semester: 8, credits: 8, prereqs: ['SI029'], type: 'estagio' },

    { code: 'SI034', name: 'E-Business', semester: 99, credits: 4, prereqs: [], type: 'eletiva' },
    { code: 'SI035', name: 'Inteligência Artificial', semester: 99, credits: 4, prereqs: ['SI021'], type: 'eletiva' },
    { code: 'SI036', name: 'Tópicos Avanç. em Redes de Computadores', semester: 99, credits: 4, prereqs: ['SI017'], type: 'eletiva' },
    { code: 'SI037', name: 'Redes Sociais', semester: 99, credits: 4, prereqs: ['SI024'], type: 'eletiva' },
    { code: 'SI038', name: 'Sistemas Multiagentes', semester: 99, credits: 4, prereqs: [], type: 'eletiva' },
    { code: 'SI039', name: 'Tópicos Especiais III', semester: 99, credits: 4, prereqs: [], type: 'eletiva' },
    { code: 'CL179', name: 'Ativ. Acadêmicas Cient. e Culturais', semester: 99, credits: 12, prereqs: [], type: 'eletiva' },
  ];

  const codeMap = {};
  data.forEach(d => codeMap[d.code] = d);

  function render() {
    const container = document.getElementById('flowchart');
    const svg = document.getElementById('svgConnections');
    svg.innerHTML = '';

    const semesters = {};
    data.forEach(d => {
      const sem = d.semester === 99 ? 99 : d.semester;
      if (!semesters[sem]) semesters[sem] = [];
      semesters[sem].push(d);
    });

    const sortedSems = Object.keys(semesters).map(Number).sort((a, b) => a - b);
    const normalSems = sortedSems.filter(s => s !== 99);
    const hasEletivas = sortedSems.includes(99);

    function createCard(d) {
      const card = document.createElement('div');
      card.className = 'card';

      if (d.type === 'eletiva') card.classList.add('eletiva');
      else if (d.type === 'estagio') card.classList.add('estagio');
      else if (d.type === 'tcc') card.classList.add('tcc');
      else card.classList.add('sem-' + String(d.semester).padStart(2, '0'));

      if (d.semester === 99) card.classList.add('sem-99');

      card.dataset.code = d.code;

      const prereqNames = d.prereqs.length
        ? d.prereqs.map(c => codeMap[c]?.name || c).join(', ')
        : '—';
      const dependentNames = data
        .filter(subj => subj.prereqs.includes(d.code))
        .map(subj => subj.name);
      const depText = dependentNames.length ? dependentNames.join(', ') : '—';

      const semLabel = d.semester === 99 ? 'EL' : d.semester;
      card.innerHTML = `
        <div class="badge">${semLabel}</div>
        <div class="code">${d.code}</div>
        <div class="name">${d.name}</div>
        <div class="credits">${d.credits} créditos</div>
        <div class="card-info">
          <span><span class="label pre">PRÉ-REQUISITOS:</span> ${prereqNames}</span>
          <span><span class="label dep">É REQUISITO PARA:</span> ${depText}</span>
        </div>
      `;

      card.addEventListener('click', () => highlightConnections(d.code));
      card.addEventListener('mouseenter', (e) => showTooltip(e, d));
      card.addEventListener('mouseleave', hideTooltip);

      return card;
    }

    function renderSemester(sem, isEletiva) {
      const row = document.createElement('div');
      row.className = 'semester-row';
      row.dataset.semester = sem;

      const sidebar = document.createElement('div');
      sidebar.className = 'semester-sidebar';

      const label = document.createElement('div');
      label.className = 'label';
      if (isEletiva) label.classList.add('eletiva-label');
      label.textContent = isEletiva ? 'ELETIVAS / OPTATIVAS' : `${sem}º SEMESTRE`;
      sidebar.appendChild(label);
      row.appendChild(sidebar);

      const wrapper = document.createElement('div');
      wrapper.className = 'cards-wrapper';

      semesters[sem].forEach(d => {
        wrapper.appendChild(createCard(d));
      });

      row.appendChild(wrapper);
      return row;
    }

    normalSems.forEach(sem => {
      container.appendChild(renderSemester(sem, false));
    });

    if (hasEletivas) {
      container.appendChild(renderSemester(99, true));
    }

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        computeConnections();
      });
    });
  }

  function computeConnections() {
    const svg = document.getElementById('svgConnections');
    svg.innerHTML = '';
    const flowEl = document.getElementById('flowchart');

    const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
    svg.appendChild(defs);

    const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
    marker.setAttribute('id', 'arrowhead');
    marker.setAttribute('viewBox', '0 0 10 10');
    marker.setAttribute('refX', '9');
    marker.setAttribute('refY', '5');
    marker.setAttribute('markerWidth', '8');
    marker.setAttribute('markerHeight', '8');
    marker.setAttribute('orient', 'auto');
    const arrowPath = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    arrowPath.setAttribute('points', '0 0 10 5 0 10');
    arrowPath.setAttribute('fill', '#00a84a');
    arrowPath.setAttribute('opacity', '0.25');
    marker.appendChild(arrowPath);
    defs.appendChild(marker);

    function makeMarker(id, color, opacity) {
      const m = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
      m.setAttribute('id', id);
      m.setAttribute('viewBox', '0 0 10 10');
      m.setAttribute('refX', '9');
      m.setAttribute('refY', '5');
      m.setAttribute('markerWidth', '8');
      m.setAttribute('markerHeight', '8');
      m.setAttribute('orient', 'auto');
      const p = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
      p.setAttribute('points', '0 0 10 5 0 10');
      p.setAttribute('fill', color);
      p.setAttribute('opacity', opacity);
      m.appendChild(p);
      return m;
    }

    defs.appendChild(makeMarker('arrowhead-hi', '#f0852e', '0.85'));
    defs.appendChild(makeMarker('arrowhead-in', '#008442', '0.85'));
    defs.appendChild(makeMarker('arrowhead-out', '#f0852e', '0.85'));

    const flowRect = flowEl.getBoundingClientRect();

    const rowEls = flowEl.querySelectorAll('.semester-row');
    const rowBounds = [];
    rowEls.forEach(el => {
      const rect = el.getBoundingClientRect();
      rowBounds.push({
        top: rect.top - flowRect.top,
        bottom: rect.bottom - flowRect.top,
      });
    });
    rowBounds.sort((a, b) => a.top - b.top);

    function findChannelY(fromY, toY) {
      const tolerance = 10;
      let fromRow = -1, toRow = -1;
      for (let i = 0; i < rowBounds.length; i++) {
        const r = rowBounds[i];
        if (fromY >= r.top - tolerance && fromY <= r.bottom + tolerance) fromRow = i;
        if (toY >= r.top - tolerance && toY <= r.bottom + tolerance) toRow = i;
      }
      if (fromRow < 0 || toRow < 0) return (fromY + toY) / 2;
      if (fromRow === toRow) return rowBounds[fromRow].bottom + 24;
      if (fromRow < toRow) {
        return (rowBounds[fromRow].bottom + rowBounds[fromRow + 1].top) / 2;
      } else {
        return (rowBounds[toRow].bottom + rowBounds[toRow + 1].top) / 2;
      }
    }

    const connections = [];

    data.forEach(d => {
      if (!d.prereqs.length) return;
      const cardEl = document.querySelector(`.card[data-code="${d.code}"]`);
      if (!cardEl) return;

      const toRect = cardEl.getBoundingClientRect();
      const toCenterX = toRect.left + toRect.width / 2 - flowRect.left;
      const toY = toRect.top - flowRect.top + 2;

      d.prereqs.forEach(preCode => {
        const preEl = document.querySelector(`.card[data-code="${preCode}"]`);
        if (!preEl) return;
        const fromRect = preEl.getBoundingClientRect();
        const fromCenterX = fromRect.left + fromRect.width / 2 - flowRect.left;
        const fromY = fromRect.top + fromRect.height - flowRect.top - 2;

        // Find the row containing each card
        const fromRow = preEl.closest('.semester-row');
        const toRow = cardEl.closest('.semester-row');

        // Get gap positions between cards in each row
        function getGapX(rowEl, cardCenterX) {
          if (!rowEl) return cardCenterX;
          const cards = rowEl.querySelectorAll('.card');
          const rects = [];
          cards.forEach(c => {
            const r = c.getBoundingClientRect();
            rects.push({ left: r.left, right: r.right });
          });
          rects.sort((a, b) => a.left - b.left);
          if (rects.length < 2) return cardCenterX;
          let bestGap = cardCenterX;
          let bestDist = Infinity;
          for (let i = 0; i < rects.length - 1; i++) {
            const gap = (rects[i].right + rects[i + 1].left) / 2 - flowRect.left;
            const dist = Math.abs(gap - cardCenterX);
            if (dist < bestDist) {
              bestDist = dist;
              bestGap = gap;
            }
          }
          return bestGap;
        }

        const fromGapX = getGapX(fromRow, fromCenterX);
        const toGapX = getGapX(toRow, toCenterX);

        connections.push({
          fromCenterX, fromY, toCenterX, toY,
          fromGapX, toGapX,
          fromCode: preCode, toCode: d.code
        });
      });
    });

    connections.forEach(conn => {
      const channelY = findChannelY(conn.fromY, conn.toY);

      const pathD = `M ${conn.fromCenterX} ${conn.fromY}
                     L ${conn.fromGapX} ${conn.fromY}
                     L ${conn.fromGapX} ${channelY}
                     L ${conn.toGapX} ${channelY}
                     L ${conn.toGapX} ${conn.toY}
                     L ${conn.toCenterX} ${conn.toY}`;

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', pathD);
      path.classList.add('connection');
      path.dataset.from = conn.fromCode;
      path.dataset.to = conn.toCode;
      path.setAttribute('marker-end', 'url(#arrowhead)');

      svg.appendChild(path);
    });

    const flowWidth = flowEl.scrollWidth;
    const flowHeight = flowEl.scrollHeight;
    svg.setAttribute('width', flowWidth);
    svg.setAttribute('height', flowHeight);
    svg.style.width = flowWidth + 'px';
    svg.style.height = flowHeight + 'px';
    svg.style.position = 'absolute';
    svg.style.top = '0';
    svg.style.left = '0';
  }

  let highlighted = false;

  function highlightConnections(code) {
    const paths = document.querySelectorAll('svg path.connection');
    const cards = document.querySelectorAll('.card');

    if (highlighted === code) {
      paths.forEach(l => {
        l.classList.remove('highlighted', 'incoming', 'outgoing');
        l.setAttribute('marker-end', 'url(#arrowhead)');
      });
      cards.forEach(c => c.classList.remove('active', 'prereq', 'dependent'));
      highlighted = false;
      return;
    }

    highlighted = code;
    paths.forEach(l => {
      l.classList.remove('highlighted', 'incoming', 'outgoing');
      l.setAttribute('marker-end', 'url(#arrowhead)');
    });
    cards.forEach(c => c.classList.remove('active', 'prereq', 'dependent'));

    const subject = codeMap[code];
    if (!subject) return;

    document.querySelector(`.card[data-code="${code}"]`)?.classList.add('active');

    paths.forEach(l => {
      if (l.dataset.to === code) {
        l.classList.add('incoming');
        l.setAttribute('marker-end', 'url(#arrowhead-in)');
        const pre = l.dataset.from;
        document.querySelector(`.card[data-code="${pre}"]`)?.classList.add('prereq');
      } else if (l.dataset.from === code) {
        l.classList.add('outgoing');
        l.setAttribute('marker-end', 'url(#arrowhead-out)');
        const dep = l.dataset.to;
        document.querySelector(`.card[data-code="${dep}"]`)?.classList.add('dependent');
      }
    });
  }

  const tooltip = document.getElementById('tooltip');
  let tooltipTimeout;

  function showTooltip(e, d) {
    clearTimeout(tooltipTimeout);
    const prereqNames = d.prereqs.length
      ? d.prereqs.map(c => codeMap[c]?.name || c).join(', ')
      : 'Nenhum';
    const dependentNames = data
      .filter(subj => subj.prereqs.includes(d.code))
      .map(subj => subj.name);
    const depText = dependentNames.length
      ? dependentNames.join(', ')
      : 'Nenhuma';

    tooltip.innerHTML = `
      <div class="tt-title">${d.code} - ${d.name}</div>
      <div style="margin-top:4px;"><span class="tt-label">PRÉ-REQUISITOS:</span> ${prereqNames}</div>
      <div><span class="tt-label">É REQUISITO PARA:</span> ${depText}</div>
    `;

    let x = e.clientX + 16;
    let y = e.clientY + 16;
    const tw = tooltip.offsetWidth || 280;
    const th = tooltip.offsetHeight || 100;
    if (x + tw > window.innerWidth - 10) x = e.clientX - tw - 16;
    if (y + th > window.innerHeight - 10) y = e.clientY - th - 16;

    tooltip.style.left = x + 'px';
    tooltip.style.top = y + 'px';
    tooltip.classList.add('visible');
  }

  function hideTooltip() {
    tooltipTimeout = setTimeout(() => tooltip.classList.remove('visible'), 150);
  }

  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          computeConnections();
        });
      });
    }, 200);
  });

  render();
</script>
</body>
</html>
